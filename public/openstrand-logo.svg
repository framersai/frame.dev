<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="strand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A67C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- DNA helix representation -->
  <g transform="translate(10, 30)">
    <path d="M0,0 Q10,-15 20,0 T40,0 T60,0 T80,0" stroke="url(#strand)" stroke-width="3" fill="none"/>
    <path d="M0,0 Q10,15 20,0 T40,0 T60,0 T80,0" stroke="url(#strand)" stroke-width="3" fill="none" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#00C896"/>
    <circle cx="20" cy="0" r="3" fill="#00C896"/>
    <circle cx="40" cy="0" r="3" fill="#00C896"/>
    <circle cx="60" cy="0" r="3" fill="#00C896"/>
    <circle cx="80" cy="0" r="3" fill="#00C896"/>
  </g>
  <text x="100" y="35" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#1a1b1d">OpenStrand</text>
</svg>
